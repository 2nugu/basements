# myCobot 280 (Pi/M5) — kinematic-only mode (no F/T sensing)
# Drop / kinematic-tracking experiments. Cheapest tier ($349 + smartphone).
# Suitable: Experiment A (sphere drop), depth tracking only.

robot:
  model:          "myCobot 280"
  variant:        "Pi"                 # or "M5"
  payload_kg:     0.25
  reach_m:        0.28
  repeatability_m: 0.0005
  dof:            6

driver:
  backend:        "pymycobot"
  pinned_version: "3.6.1"
  port:           "/dev/ttyACM0"       # auto-detected on most systems
  baudrate:       1000000

force_estimator:
  type:           "kinematic_only"
  # No force estimation; produces (force, torque) = (0, 0) with infinite sigma.
  # Validity domain: Experiment A only.

publish_rate_hz:  50

urdf:
  # Reference URDF from elephantrobotics/mycobot_ros2, vendored at
  # extensions/ros2_bridge/urdf/mycobot_280.urdf
  path:           "urdf/mycobot_280.urdf"
  base_link:      "base_link"
  ee_link:        "joint6_flange"

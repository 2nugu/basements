# myCobot 280 — joint-current force estimator
# Reads motor current via pymycobot.get_servo_currents() → joint torques
# → Jacobian inversion to end-effector wrench. Accuracy ±15%.
# Suitable: Experiments B (probe insertion) up to 50mm depth, light probes.

robot:
  model:          "myCobot 280"
  variant:        "Pi"
  payload_kg:     0.25
  reach_m:        0.28
  repeatability_m: 0.0005
  dof:            6

driver:
  backend:        "pymycobot"
  pinned_version: "3.6.1"
  port:           "/dev/ttyACM0"
  baudrate:       1000000

force_estimator:
  type:           "joint_current"
  # Per-joint motor torque constants (N·m / A); from myCobot manual + calibration.
  # These are nominal; per-unit calibration recommended.
  torque_constants_nm_per_a:
    - 0.45   # joint 1 (base)
    - 0.45   # joint 2 (shoulder)
    - 0.45   # joint 3 (elbow)
    - 0.18   # joint 4 (wrist1)
    - 0.18   # joint 5 (wrist2)
    - 0.10   # joint 6 (flange)
  jacobian_method: "geometric"          # or "numerical"
  gravity_compensation: true            # subtract static gravity load
  expected_accuracy_pct: 15

publish_rate_hz:  50

urdf:
  path:           "urdf/mycobot_280.urdf"
  base_link:      "base_link"
  ee_link:        "joint6_flange"
